name: Trigger Update Data Now

# Workflow temporário pra disparar update-data sem precisar clicar em UI.
# Usa o GH_PAT (mesmo secret usado pelo keepalive) pra chamar workflow_dispatch
# do update-data.yml no main. Filtra por path pra só rodar quando este arquivo
# muda — evita disparos acidentais.

on:
  push:
    paths:
      - '.github/workflows/trigger-now.yml'

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar update-data.yml em main
        run: |
          set -e
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-data.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "update-data disparado com sucesso"
