name: Update Dashboard Data

on:
  schedule:
    - cron: '0 8 * * *'  # Executa diariamente às 8:00 AM UTC (5:00 AM Brasília)
  workflow_dispatch:  # Permite executar manualmente

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update data from API
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs   = require('fs');

          const TOKEN = process.env.API_TOKEN;
          const BASE  = 'dashboard.estacaosapatao.com.br';

          // Datas: dados são D-1
          const now       = new Date();
          const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
          const YEAR      = yesterday.getFullYear();
          const MONTH     = String(yesterday.getMonth() + 1).padStart(2, '0');
          const DIA_ATUAL = yesterday.getDate();
          const DIAS_MES  = new Date(YEAR, yesterday.getMonth() + 1, 0).getDate();
          const PERIODO   = yesterday.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
          const PERIODO_FMT = PERIODO.charAt(0).toUpperCase() + PERIODO.slice(1);

          function fetchJSON(path) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: BASE, path,
                headers: { Authorization: `Bearer ${TOKEN}` }
              };
              https.get(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(new Error(`JSON inválido em ${path}: ${data.substring(0,200)}`)); }
                });
              }).on('error', reject);
            });
          }

          // Mapeamento de grupo por acelerador
          const GRUPO_MAP = {
            'FAT. LOJA':          'loja',
            'CLIENTES':           'loja',
            'TICKET MÉDIO LOJA':  'loja',
            'REFEIÇÕES':          'loja',
            'EXTRAS':             'loja',
            'ALAMINUTA':          'loja',
            'COMBO FARROUPILHA':  'loja',
            'COMBO PÃO DE QUEIJO':'loja',
            'CICLO OTTO':         'postos',
            'MIX V-POWER':        'postos',
            'CICLO DIESEL':       'postos',
            'ARLA':               'postos',
            'PA':                 'postos',
            'LAVAGEM - CUPONS':   'postos',
            'PIX':                'postos',
            'SHELLBOX %':         'postos',
            'APP NOVOS':          'fidelidade',
          };

          (async () => {
            try {
              const [cardsRaw, acelRaw, prodRaw] = await Promise.all([
                fetchJSON(`/api/dashboard/cards?ano=${YEAR}&meses=${MONTH}`),
                fetchJSON(`/api/dashboard/aceleradores?ano=${YEAR}&meses=${MONTH}`),
                fetchJSON(`/api/dashboard/top-produtos?ano=${YEAR}&meses=${MONTH}`),
              ]);

              // Valida se as respostas são arrays (token inválido retorna objeto)
              if (!Array.isArray(cardsRaw)) throw new Error(`Token inválido ou expirado. Resposta cards: ${JSON.stringify(cardsRaw)}`);
              if (!Array.isArray(acelRaw))  throw new Error(`Token inválido ou expirado. Resposta aceleradores: ${JSON.stringify(acelRaw)}`);
              if (!Array.isArray(prodRaw))  throw new Error(`Token inválido ou expirado. Resposta top-produtos: ${JSON.stringify(prodRaw)}`);

              const current = JSON.parse(fs.readFileSync('data.json', 'utf8'));

              // META
              current.meta.periodo     = PERIODO_FMT;
              current.meta.dia_atual   = DIA_ATUAL;
              current.meta.dias_no_mes = DIAS_MES;
              current.meta.atualizado_em = now.toISOString().split('T')[0];

              // CARDS — normaliza nome do canal
              current.cards = cardsRaw.map(c => ({
                canal:       c.canal === 'PRODUTOS AUTOMOTIVOS' ? 'PROD. AUTO' : c.canal,
                is_qtd:      c.is_qtd,
                metrica:     c.metrica,
                projecao:    c.projecao,
                meta:        c.meta,
                pct_proj:    c.pct_proj,
                mix_vpower:  c.mix_vpower ?? null,
                dia_atual:   c.dia_atual,
                dias_no_mes: c.dias_no_mes,
              }));

              // ACELERADORES — adiciona grupo
              current.aceleradores = acelRaw.map(a => ({
                grupo:       GRUPO_MAP[a.acelerador] || 'postos',
                acelerador:  a.acelerador,
                realizado:   a.realizado,
                meta:        a.meta ?? null,
                meta_dia:    a.meta_dia ?? null,
                media_dia:   a.media_dia ?? null,
                projecao:    a.projecao ?? null,
                pct_proj:    a.pct_proj ?? null,
                is_currency: a.is_currency || false,
                is_pct:      a.is_percent || false,
              }));

              // TOP PRODUTOS — adiciona rank
              current.top_produtos = prodRaw.map((p, i) => ({
                rank:        i + 1,
                produto:     p.produto,
                qtd:         p.qtd,
                faturamento: p.faturamento,
              }));

              fs.writeFileSync('data.json', JSON.stringify(current, null, 2) + '\n');
              console.log(`✅ data.json atualizado — ${PERIODO_FMT} · Dia ${DIA_ATUAL}/${DIAS_MES}`);

            } catch(err) {
              console.error('❌ Erro ao buscar dados da API:', err.message);
              process.exit(1);
            }
          })();
          EOF
        env:
          API_TOKEN: ${{ secrets.DASHBOARD_API_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet data.json; then
            echo "Nenhuma mudança detectada"
          else
            git add data.json
            git commit -m "chore: update dashboard data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
