name: Update Dashboard Data

on:
  schedule:
    - cron: '0 8 * * *'  # Executa diariamente às 8:00 AM UTC (5:00 AM Brasília)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update data from API
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs    = require('fs');

          const TOKEN          = process.env.API_TOKEN;
          const ANTHROPIC_KEY  = process.env.ANTHROPIC_API_KEY;
          const BASE_DASHBOARD = 'dashboard.estacaosapatao.com.br';
          const BASE_CLAUDE    = 'api.anthropic.com';

          // Datas: dados são D-1
          const now       = new Date();
          const yesterday = new Date(now);
          yesterday.setDate(now.getDate() - 1);

          const YEAR      = yesterday.getFullYear();
          const MONTH     = String(yesterday.getMonth() + 1).padStart(2, '0');
          const DIA_ATUAL = yesterday.getDate();
          const DIAS_MES  = new Date(YEAR, yesterday.getMonth() + 1, 0).getDate();

          const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
          const PERIODO_FMT = `${MESES[yesterday.getMonth()]} de ${YEAR}`;

          // Função genérica de requisição HTTPS
          function request(opts, body) {
            return new Promise((resolve, reject) => {
              const bodyBuf = body ? Buffer.from(JSON.stringify(body)) : null;
              if (bodyBuf) opts.headers['Content-Length'] = bodyBuf.length;
              const req = https.request(opts, res => {
                const chunks = [];
                res.on('data', c => chunks.push(c));
                res.on('end', () => {
                  const text = Buffer.concat(chunks).toString();
                  try { resolve(JSON.parse(text)); }
                  catch(e) { reject(new Error(`JSON inválido [${res.statusCode}]: ${text.substring(0,300)}`)); }
                });
              });
              req.on('error', reject);
              if (bodyBuf) req.write(bodyBuf);
              req.end();
            });
          }

          function dashboardGet(path) {
            return request({
              hostname: BASE_DASHBOARD, path, method: 'GET',
              headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
            });
          }

          function claudePost(body) {
            return request({
              hostname: BASE_CLAUDE, path: '/v1/messages', method: 'POST',
              headers: {
                'x-api-key': ANTHROPIC_KEY,
                'anthropic-version': '2023-06-01',
                'Content-Type': 'application/json'
              }
            }, body);
          }

          // Mapeamento de grupo por acelerador
          const GRUPO_MAP = {
            'FAT. LOJA':           'loja',
            'CLIENTES':            'loja',
            'TICKET MÉDIO LOJA':   'loja',
            'REFEIÇÕES':           'loja',
            'EXTRAS':              'loja',
            'ALAMINUTA':           'loja',
            'COMBO FARROUPILHA':   'loja',
            'COMBO PÃO DE QUEIJO': 'loja',
            'CICLO OTTO':          'postos',
            'MIX V-POWER':         'postos',
            'CICLO DIESEL':        'postos',
            'ARLA':                'postos',
            'PA':                  'postos',
            'LAVAGEM - CUPONS':    'postos',
            'PIX':                 'postos',
            'SHELLBOX %':          'postos',
            'APP NOVOS':           'fidelidade',
          };

          function fmtVal(val, is_currency, is_pct) {
            if (val == null) return '—';
            if (is_pct)      return val.toFixed(1) + '%';
            if (is_currency) return 'R$ ' + Math.round(val).toLocaleString('pt-BR');
            return Math.round(val).toLocaleString('pt-BR');
          }

          async function gerarAcoes(aceleradores) {
            const abaixo = aceleradores.filter(a => a.pct_proj != null && a.pct_proj < 1.0);
            if (!abaixo.length) return [];

            const linhas = abaixo.map(a => {
              const proj = fmtVal(a.projecao, a.is_currency, a.is_pct);
              const meta = fmtVal(a.meta,     a.is_currency, a.is_pct);
              const pct  = Math.round(a.pct_proj * 100);
              return `- ${a.acelerador} (${a.grupo}): projeção ${proj} vs meta ${meta} = ${pct}%`;
            }).join('\n');

            const prompt = `Você é consultor operacional da Estação Sapatão (posto + loja de conveniência no RS).

Indicadores abaixo da meta em ${DIA_ATUAL}/${MONTH}/${YEAR}:
${linhas}

Para cada indicador, escreva UMA ação curta (1-2 frases), prática e específica que a equipe executa HOJE.
Use os números reais para contextualizar.

Responda SOMENTE com JSON válido, sem markdown:
[{"acelerador":"NOME_EXATO","acao":"texto da ação"}]`;

            const resp = await claudePost({
              model: 'claude-haiku-4-5',
              max_tokens: 1024,
              messages: [{ role: 'user', content: prompt }]
            });

            if (!resp.content || !resp.content[0]) {
              throw new Error('Resposta inválida do Claude: ' + JSON.stringify(resp).substring(0,200));
            }

            const text = resp.content[0].text.trim();
            const match = text.match(/\[[\s\S]*\]/);
            if (!match) throw new Error('Claude não retornou JSON: ' + text.substring(0,200));
            return JSON.parse(match[0]);
          }

          (async () => {
            try {
              console.log('📡 Buscando dados da API...');
              const [cardsRaw, acelRaw, prodRaw] = await Promise.all([
                dashboardGet(`/api/dashboard/cards?ano=${YEAR}&meses=${MONTH}`),
                dashboardGet(`/api/dashboard/aceleradores?ano=${YEAR}&meses=${MONTH}`),
                dashboardGet(`/api/dashboard/top-produtos?ano=${YEAR}&meses=${MONTH}`),
              ]);

              if (!Array.isArray(cardsRaw)) throw new Error('Token inválido. Resposta: ' + JSON.stringify(cardsRaw));
              if (!Array.isArray(acelRaw))  throw new Error('Token inválido. Resposta: ' + JSON.stringify(acelRaw));
              if (!Array.isArray(prodRaw))  throw new Error('Token inválido. Resposta: ' + JSON.stringify(prodRaw));

              console.log(`✅ ${cardsRaw.length} cards, ${acelRaw.length} aceleradores, ${prodRaw.length} produtos`);

              const current = JSON.parse(fs.readFileSync('data.json', 'utf8'));

              current.meta.periodo     = PERIODO_FMT;
              current.meta.dia_atual   = DIA_ATUAL;
              current.meta.dias_no_mes = DIAS_MES;
              current.meta.atualizado_em = now.toISOString().split('T')[0];

              current.cards = cardsRaw.map(c => ({
                canal:       c.canal === 'PRODUTOS AUTOMOTIVOS' ? 'PROD. AUTO' : c.canal,
                is_qtd:      c.is_qtd,
                metrica:     c.metrica,
                projecao:    c.projecao,
                meta:        c.meta,
                pct_proj:    c.pct_proj,
                mix_vpower:  c.mix_vpower ?? null,
                dia_atual:   c.dia_atual,
                dias_no_mes: c.dias_no_mes,
              }));

              current.aceleradores = acelRaw.map(a => ({
                grupo:       GRUPO_MAP[a.acelerador] || 'postos',
                acelerador:  a.acelerador,
                realizado:   a.realizado,
                meta:        a.meta ?? null,
                meta_dia:    a.meta_dia ?? null,
                media_dia:   a.media_dia ?? null,
                projecao:    a.projecao ?? null,
                pct_proj:    a.pct_proj ?? null,
                is_currency: a.is_currency || false,
                is_pct:      a.is_percent || false,
              }));

              current.top_produtos = prodRaw.map((p, i) => ({
                rank:        i + 1,
                produto:     p.produto,
                qtd:         p.qtd,
                faturamento: p.faturamento,
              }));

              console.log('🤖 Gerando ações com Claude...');
              const acoes = await gerarAcoes(current.aceleradores);
              current.acoes = acoes;
              console.log(`✅ ${acoes.length} ações geradas`);

              fs.writeFileSync('data.json', JSON.stringify(current, null, 2) + '\n');
              console.log(`✅ data.json atualizado — ${PERIODO_FMT} · Dia ${DIA_ATUAL}/${DIAS_MES}`);

            } catch(err) {
              console.error('❌ Erro:', err.message);
              process.exit(1);
            }
          })();
          EOF
        env:
          API_TOKEN: ${{ secrets.DASHBOARD_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if git diff --quiet data.json; then
            echo "Nenhuma mudança detectada"
          else
            git add data.json
            git commit -m "chore: update dashboard data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
