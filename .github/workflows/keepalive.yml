name: Keep Alive

on:
  schedule:
    - cron: '17 6 * * *'  # 6:17 AM UTC / 3:17 AM Brasília — horário fora do pico
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Manter repositório ativo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Atualiza timestamp no arquivo de controle
          echo "last_keepalive=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u +'%Y-%m-%d')" || echo "Sem mudanças"
          git push || echo "Push não necessário"

      - name: Disparar atualização de dados
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-data.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Workflow update-data disparado com sucesso"
